name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  test:
    name: test (${{ matrix.os }} / Rust ${{ matrix.rust }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: ["1.85", stable]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --all-features

  release-build:
    name: release build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --all-features

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings

  security-audit:
    name: security audit — cargo audit + cargo deny (REQ-SEC-006)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Audit dependencies for known CVEs
        run: cargo audit
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - name: Deny policy — licenses and advisories
        run: cargo deny check advisories licenses sources || echo "cargo-deny: review warnings above"

  coverage:
    name: structural coverage — cargo tarpaulin (REQ-DO-013)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked
      - name: Measure statement + branch coverage
        run: cargo tarpaulin --out Xml --output-dir coverage/ --engine llvm
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/cobertura.xml

  relay-conform:
    name: RELAY §12 conformance — relay conform --strict (REQ-RELAY-004, §20.1.1)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build RELAY CLI
        run: |
          git clone https://github.com/SoundMatt/RELAY /tmp/relay-src
          cd /tmp/relay-src && go build -o /tmp/relay ./cmd/relay/
      - name: Build rust-dds release binary
        run: cargo build --release
      - name: Validate §12.1/§12.2/§12.3 JSON schemas
        run: /tmp/relay conform --strict ./target/release/rust-dds

  relay-interop:
    name: RELAY behavioural conformance — relay interop (§20.1.3)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Build RELAY CLI
        run: |
          git clone https://github.com/SoundMatt/RELAY /tmp/relay-src
          cd /tmp/relay-src && go build -o /tmp/relay ./cmd/relay/
      - name: Build rust-dds release binary
        run: cargo build --release
      - name: Run behavioural conformance (SKIP is PASS; FAIL blocks)
        run: /tmp/relay interop ./target/release/rust-dds

  rsfusa-check:
    name: rsFuSa safety check — exits 1 on ERROR (§20.1.2, REQ-ASIL/IEC/DO)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rsfusa CLI
        run: |
          git clone https://github.com/SoundMatt/rust-FuSa /tmp/rsfusa-src
          cd /tmp/rsfusa-src && cargo build --release
          cp /tmp/rsfusa-src/target/release/rsfusa /tmp/rsfusa
      - name: Run safety check gate
        run: /tmp/rsfusa check

  rsfusa-qualify:
    name: rsFuSa tool qualification — 16/16 must pass (§20.1.2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rsfusa CLI
        run: |
          git clone https://github.com/SoundMatt/rust-FuSa /tmp/rsfusa-src
          cd /tmp/rsfusa-src && cargo build --release
          cp /tmp/rsfusa-src/target/release/rsfusa /tmp/rsfusa
      - name: Run tool qualification suite
        run: /tmp/rsfusa qualify

  rsfusa-vuln:
    name: rsFuSa dependency vulnerability scan (§20.1.2, REQ-SEC-006)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rsfusa CLI
        run: |
          git clone https://github.com/SoundMatt/rust-FuSa /tmp/rsfusa-src
          cd /tmp/rsfusa-src && cargo build --release
          cp /tmp/rsfusa-src/target/release/rsfusa /tmp/rsfusa
      - name: Scan dependencies for vulnerabilities
        run: /tmp/rsfusa vuln

  rsfusa-cyber:
    name: rsFuSa cybersecurity analysis (§20.1.2, REQ-SEC)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rsfusa CLI
        run: |
          git clone https://github.com/SoundMatt/rust-FuSa /tmp/rsfusa-src
          cd /tmp/rsfusa-src && cargo build --release
          cp /tmp/rsfusa-src/target/release/rsfusa /tmp/rsfusa
      - name: Run cybersecurity analysis
        run: /tmp/rsfusa cyber

  fusa-trace:
    name: FuSa traceability 100% (§20.1.2, REQ-IEC-003/004, REQ-DO-001)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check all requirements have fusa:req implementation annotations
        run: |
          MISSING_REQ=0
          while IFS= read -r req_id; do
            if ! grep -rq "//fusa:req ${req_id}" src/; then
              echo "ERROR: ${req_id} has no //fusa:req annotation in src/"
              MISSING_REQ=1
            fi
          done < <(python3 -c "
          import json, sys
          reqs = json.load(open('requirements.json'))['requirements']
          for r in reqs: print(r['id'])
          ")
          if [ "$MISSING_REQ" -ne 0 ]; then
            echo ""
            echo "All requirements must have at least one //fusa:req annotation."
            exit 1
          fi
          echo "All requirements have fusa:req annotations."
      - name: Check all requirements have fusa:test test annotations
        run: |
          MISSING_TEST=0
          while IFS= read -r req_id; do
            if ! grep -rq "//fusa:test ${req_id}" src/; then
              echo "ERROR: ${req_id} has no //fusa:test annotation in src/"
              MISSING_TEST=1
            fi
          done < <(python3 -c "
          import json, sys
          reqs = json.load(open('requirements.json'))['requirements']
          for r in reqs: print(r['id'])
          ")
          if [ "$MISSING_TEST" -ne 0 ]; then
            echo ""
            echo "All requirements must have at least one //fusa:test annotation."
            exit 1
          fi
          echo "All requirements have fusa:test annotations."
      - name: Check no orphan fusa tags reference unknown requirement IDs
        run: |
          ORPHAN=0
          KNOWN=$(python3 -c "
          import json
          reqs = json.load(open('requirements.json'))['requirements']
          for r in reqs: print(r['id'])
          ")
          while IFS= read -r tag; do
            req_id=$(echo "$tag" | grep -oP 'REQ-[A-Z]+-\d+')
            if ! echo "$KNOWN" | grep -qx "$req_id"; then
              echo "ERROR: orphan tag referencing unknown ID: $req_id"
              ORPHAN=1
            fi
          done < <(grep -rh "//fusa:" src/ | grep -oP 'REQ-[A-Z]+-\d+')
          if [ "$ORPHAN" -ne 0 ]; then
            exit 1
          fi
          echo "No orphan fusa tags found."

  safety-artifacts:
    name: safety artifacts and evidence (§20.4, REQ-DO-001, REQ-ASIL-009)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify all required safety, security, and evidence documents exist
        run: |
          MISSING=0
          for f in \
            SECURITY.md SAFETY_PLAN.md SAFETY_MANUAL.md BOUNDARY.md \
            requirements.json \
            .fusa.json .fusa-reqs.json .fusa-hara.json \
            fmea.json fmea.csv tara.json tara.md \
            sbom.json provenance.json artifact-manifest.json; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required artifact missing: $f"
              MISSING=1
            fi
          done
          if [ "$MISSING" -ne 0 ]; then exit 1; fi
          echo "All safety artifacts and evidence documents present."
      - name: Verify requirements.json is valid JSON
        run: python3 -c "import json; json.load(open('requirements.json')); print('requirements.json is valid JSON')"
      - name: Verify .fusa.json is valid JSON
        run: python3 -c "import json; json.load(open('.fusa.json')); print('.fusa.json is valid JSON')"
      - name: Verify fmea.json is valid JSON
        run: python3 -c "import json; json.load(open('fmea.json')); print('fmea.json is valid JSON')"
      - name: Verify tara.json is valid JSON
        run: python3 -c "import json; json.load(open('tara.json')); print('tara.json is valid JSON')"
      - name: Verify sbom.json is valid JSON
        run: python3 -c "import json; json.load(open('sbom.json')); print('sbom.json is valid JSON')"
      - name: Verify .fusa-hara.json is valid JSON with required hazards
        run: |
          python3 -c "
          import json
          d = json.load(open('.fusa-hara.json'))
          hazards = d.get('hazards', [])
          assert len(hazards) >= 5, f'HARA must have at least 5 hazards, found {len(hazards)}'
          for h in hazards:
              assert 'hazardId' in h and 'asil' in h, f'Hazard missing required fields: {h}'
          print(f'.fusa-hara.json valid: {len(hazards)} hazards')
          "
      - name: Verify tara.json has DDS-specific threats
        run: |
          python3 -c "
          import json
          d = json.load(open('tara.json'))
          entries = d.get('entries', [])
          assert len(entries) >= 5, f'TARA must have at least 5 threats, found {len(entries)}'
          print(f'tara.json valid: {len(entries)} threats')
          "
      - name: Verify requirements.json has expected minimum count
        run: |
          python3 -c "
          import json
          d = json.load(open('requirements.json'))
          reqs = d.get('requirements', [])
          assert len(reqs) >= 100, f'Expected at least 100 requirements, found {len(reqs)}'
          print(f'requirements.json valid: {len(reqs)} requirements')
          "

  dco:
    name: DCO
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check DCO sign-off
        run: |
          BASE=${{ github.event.pull_request.base.sha }}
          HEAD=${{ github.event.pull_request.head.sha }}
          MISSING=$(git log --format="%H %s" "$BASE".."$HEAD" | while read hash msg; do
            if ! git show "$hash" | grep -qiE "^    Signed-off-by:"; then
              echo "$hash $msg"
            fi
          done)
          if [ -n "$MISSING" ]; then
            echo "ERROR: The following commits are missing Signed-off-by:"
            echo "$MISSING"
            exit 1
          fi
          echo "All commits have Signed-off-by."
